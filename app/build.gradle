plugins {
    id "com.android.application"
    id "com.chaquo.python"
}

android {
    namespace "com.beiyang.meet"
    compileSdk 35

    defaultConfig {
        applicationId "com.beiyang.meet"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"

        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }
    }
}

chaquopy {
    defaultConfig {
        version = "3.11"
    }
}
